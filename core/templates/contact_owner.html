<!DOCTYPE html>
<html>

<head>

    <title>Contact Owner</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-5">

        <h2 class="mb-4">

            Contact Owner

        </h2>

        <h5 class="mb-4">

            Property:
            {{ property.title }}

        </h5>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">

                    Phone Number

                </label>

                <input
                    type="text"
                    class="form-control"
                    name="phone"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Message

                </label>

                <textarea
                    class="form-control"
                    rows="5"
                    name="message"
                    required></textarea>

            </div>

            <button
                class="btn btn-success">

                Send Inquiry

            </button>

        </form>

    </div>

</div>

</body>

</html>
