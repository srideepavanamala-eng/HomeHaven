<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | HomeHaven</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg border-0 rounded-4 p-5" style="width:500px;">

        <h2 class="text-center fw-bold">
            Create Account
        </h2>

        <p class="text-center text-secondary mb-4">
            Join HomeHaven today
        </p>

        <form method="POST">

    {% csrf_token %}

    <!-- First & Last Name -->
    <div class="row">

        <div class="col-md-6 mb-3">

            <label class="form-label fw-semibold">
                First Name
            </label>

            <input
                type="text"
                class="form-control"
                name="first_name"
                placeholder="First Name"
                required>

        </div>

        <div class="col-md-6 mb-3">

            <label class="form-label fw-semibold">
                Last Name
            </label>

            <input
                type="text"
                class="form-control"
                name="last_name"
                placeholder="Last Name"
                required>

        </div>

    </div>

    <!-- Username -->

    <div class="mb-3">

        <label class="form-label fw-semibold">
            Username
        </label>

        <input
            type="text"
            class="form-control"
            name="username"
            placeholder="Choose a username"
            required>

    </div>

    <!-- Email -->

    <div class="mb-3">

        <label class="form-label fw-semibold">
            Email Address
        </label>

        <input
            type="email"
            class="form-control"
            name="email"
            placeholder="Enter your email"
            required>

    </div>

    <!-- Password -->

    <div class="mb-3">

        <label class="form-label fw-semibold">
            Password
        </label>

        <input
            type="password"
            class="form-control"
            name="password"
            placeholder="Enter password"
            required>

    </div>

    <!-- Confirm Password -->

    <div class="mb-4">

        <label class="form-label fw-semibold">
            Confirm Password
        </label>

        <input
            type="password"
            class="form-control"
            name="confirm_password"
            placeholder="Confirm password"
            required>

    </div>

    <!-- Role -->

    <div class="mb-4">

        <label class="form-label fw-semibold d-block mb-2">
            Register As
        </label>

        <div class="form-check">

            <input
                class="form-check-input"
                type="radio"
                name="role"
                value="owner"
                id="owner"
                required>

            <label class="form-check-label" for="owner">
                Owner
            </label>

        </div>

        <div class="form-check">

            <input
                class="form-check-input"
                type="radio"
                name="role"
                value="tenant"
                id="tenant">

            <label class="form-check-label" for="tenant">
                Tenant
            </label>

        </div>

    </div>

    <!-- Register Button -->

    <div class="d-grid">

        <button type="submit" class="btn btn-primary btn-lg">
            Create Account
        </button>

    </div>

</form>

<div class="text-center mt-4">

    <p class="text-secondary">

        Already have an account?

        <a href="{% url 'home' %}" class="text-decoration-none fw-semibold">
            Login
        </a>

    </p>

</div>

    </div>

</div>

</body>
</html>
