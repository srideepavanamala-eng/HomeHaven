<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Property</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-5 rounded-4">

        <h2 class="mb-4">Edit your Property</h2>

        <form method="POST">

    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Property Title</label>
        <input type="text" class="form-control" name="title" value="{{ property.title }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">City</label>
        <input type="text" class="form-control" name="city" value="{{ property.city }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Address</label>
        <textarea class="form-control" name="address" value="{{ property.address }}" rows="3" required></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Monthly Rent</label>
        <input type="number" class="form-control" name="rent" value="{{ property.rent }}" required>
    </div>

    <div class="row">

        <div class="col-md-6">
            <label class="form-label">Bedrooms</label>
            <input type="number" class="form-control" name="bedrooms" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Bathrooms</label>
            <input type="number" class="form-control" name="bathrooms" required>
        </div>

    </div>

    <div class="mt-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" name="description" rows="4" value="{{ property.description}}" required></textarea>
    </div>
    <div class="mb-3">

    <label class="form-label">Status</label>

    <select class="form-select" name="status">

        <option value="Available"
            {% if property.status == "Available" %}selected{% endif %}>
            Available
        </option>

        <option value="Occupied"
            {% if property.status == "Occupied" %}selected{% endif %}>
            Occupied
        </option>

    </select>

</div>
    <button type="submit" class="btn btn-primary mt-4">
        Save Property
    </button>

</form>
    </div>

</div>

</body>
</html>
